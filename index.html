<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Meu Financeiro</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0F6E56" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Financeiro" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f0; color: #1a1a1a; min-height: 100vh; padding-bottom: 72px; }

    /* HEADER */
    .header { background: #0F6E56; color: #fff; padding: 48px 20px 20px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .header-greeting { font-size: 16px; opacity: 0.85; }
    .header-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
    .header-month { font-size: 13px; opacity: 0.7; margin-bottom: 16px; }
    .header-saldo { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
    .header-valor { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
    .header-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .header-card { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 10px 14px; }
    .header-card-label { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
    .header-card-val { font-size: 16px; font-weight: 600; }

    /* SEÇÕES */
    .section { display: none; padding: 16px; }
    .section.active { display: block; }

    /* CARDS */
    .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 0.5px solid rgba(0,0,0,0.06); }
    .card-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* TRANSAÇÕES */
    .tx { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid #f0f0ec; }
    .tx:last-child { border-bottom: none; }
    .tx-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .tx-info { flex: 1; }
    .tx-name { font-size: 14px; font-weight: 500; }
    .tx-meta { font-size: 12px; color: #888; }
    .tx-right { text-align: right; }
    .tx-valor { font-size: 14px; font-weight: 600; }
    .tx-data { font-size: 11px; color: #aaa; }
    .tx-del { background: none; border: none; color: #ccc; font-size: 20px; padding: 4px 8px; cursor: pointer; border-radius: 8px; }
    .tx-del:active { background: #fee; color: #e44; }
    .positivo { color: #1D9E75; }
    .negativo { color: #D85A30; }

    /* FORMULÁRIO */
    .tipo-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .tipo-btn { padding: 12px; border-radius: 12px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; color: #888; }
    .tipo-btn.ativo-rec { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
    .tipo-btn.ativo-exp { background: #FAECE7; border-color: #D85A30; color: #993C1D; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 6px; display: block; }
    .form-input, .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid #e8e8e8; border-radius: 12px; font-size: 15px; background: #fafaf8; color: #1a1a1a; outline: none; appearance: none; }
    .form-input:focus, .form-select:focus { border-color: #1D9E75; background: #fff; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-salvar { width: 100%; padding: 15px; background: #1D9E75; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn-salvar:active { background: #0F6E56; }
    .btn-salvar:disabled { background: #aaa; }

    /* GRÁFICO BARRAS */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 12px; color: #555; width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .bar-track { flex: 1; height: 8px; background: #f0f0ec; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .bar-val { font-size: 12px; color: #555; width: 72px; text-align: right; flex-shrink: 0; }

    /* MESES NAV */
    .mes-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .mes-nav button { background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 6px 14px; font-size: 16px; cursor: pointer; color: #333; }
    .mes-nome { font-size: 15px; font-weight: 600; color: #333; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 0.5px solid #e8e8e8; display: flex; padding: 8px 0 20px; z-index: 100; }
    .bnav { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #aaa; cursor: pointer; padding: 4px 0; border: none; background: none; }
    .bnav.ativo { color: #1D9E75; }
    .bnav svg { width: 22px; height: 22px; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 32px 16px; color: #aaa; font-size: 14px; }

    /* TOAST */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* LOADING */
    .loading { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-greeting">Olá! 👋</div>
      <div class="header-month" id="header-month"></div>
    </div>
    <div class="header-avatar">$</div>
  </div>
  <div class="header-saldo">Saldo do mês</div>
  <div class="header-valor" id="header-saldo">R$ 0,00</div>
  <div class="header-cards">
    <div class="header-card">
      <div class="header-card-label">↓ Receitas</div>
      <div class="header-card-val" id="header-rec">R$ 0</div>
    </div>
    <div class="header-card">
      <div class="header-card-label">↑ Despesas</div>
      <div class="header-card-val" id="header-exp">R$ 0</div>
    </div>
  </div>
</div>

<!-- SEÇÃO: INÍCIO -->
<div class="section active" id="sec-inicio">
  <div class="mes-nav">
    <button onclick="mudarMes(-1)">‹</button>
    <span class="mes-nome" id="mes-label"></span>
    <button onclick="mudarMes(1)">›</button>
  </div>
  <div class="card">
    <div class="card-title">Últimos lançamentos</div>
    <div id="lista-inicio"><div class="loading">Carregando...</div></div>
  </div>
  <div class="card">
    <div class="card-title">Gastos por categoria</div>
    <div id="lista-categorias"><div class="empty">Nenhuma despesa ainda.</div></div>
  </div>
</div>

<!-- SEÇÃO: LANÇAMENTOS -->
<div class="section" id="sec-lancamentos">
  <div class="mes-nav">
    <button onclick="mudarMes(-1)">‹</button>
    <span class="mes-nome" id="mes-label2"></span>
    <button onclick="mudarMes(1)">›</button>
  </div>
  <div class="card">
    <div class="card-title">Todos os lançamentos</div>
    <div id="lista-todos"><div class="loading">Carregando...</div></div>
  </div>
</div>

<!-- SEÇÃO: ADICIONAR -->
<div class="section" id="sec-adicionar">
  <div class="card">
    <div class="tipo-toggle">
      <button class="tipo-btn ativo-rec" id="btn-rec" onclick="setTipo('receita')">↓ Receita</button>
      <button class="tipo-btn" id="btn-exp" onclick="setTipo('despesa')">↑ Despesa</button>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input class="form-input" type="text" id="inp-desc" placeholder="Ex: Salário, Mercado..." />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" type="number" id="inp-valor" placeholder="0,00" min="0" step="0.01" inputmode="decimal" />
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" type="date" id="inp-data" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-select" id="inp-cat"></select>
    </div>
    <button class="btn-salvar" id="btn-salvar" onclick="salvarLancamento()">Salvar lançamento</button>
  </div>
</div>

<!-- SEÇÃO: GRÁFICOS -->
<div class="section" id="sec-graficos">
  <div class="mes-nav">
    <button onclick="mudarMes(-1)">‹</button>
    <span class="mes-nome" id="mes-label3"></span>
    <button onclick="mudarMes(1)">›</button>
  </div>
  <div class="card">
    <div class="card-title">Resumo do mês</div>
    <div id="graficos-resumo"><div class="empty">Nenhum dado ainda.</div></div>
  </div>
  <div class="card">
    <div class="card-title">Despesas por categoria</div>
    <div id="graficos-cat"><div class="empty">Nenhuma despesa ainda.</div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav ativo" onclick="irPara('inicio', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
    Início
  </button>
  <button class="bnav" onclick="irPara('lancamentos', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Gastos
  </button>
  <button class="bnav" onclick="irPara('adicionar', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    Adicionar
  </button>
  <button class="bnav" onclick="irPara('graficos', this)">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    Gráficos
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pksorodvztmmeqnixnie.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrc29yb2R2enRtbWVxbml4bmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTYxNTUsImV4cCI6MjA5NTE3MjE1NX0.ZeH4qNN1xZtIKqvncX5_aODodU9rgEDk_6alC_kqEPs';

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS_RECEITA = ['Salário','Freelance','Presente','Outros'];
const CATS_DESPESA = ['Alimentação','Moradia','Transporte','Saúde','Lazer','Educação','Roupas','Contas','Outros'];
const CAT_EMOJI = { 'Salário':'💼','Freelance':'💻','Presente':'🎁','Alimentação':'🛒','Moradia':'🏠','Transporte':'🚗','Saúde':'❤️','Lazer':'🎉','Educação':'📚','Roupas':'👕','Contas':'⚡','Outros':'📦' };
const CAT_COR = { 'Salário':'#1D9E75','Freelance':'#185FA5','Presente':'#D4537E','Alimentação':'#D85A30','Moradia':'#7F77DD','Transporte':'#378ADD','Saúde':'#D4537E','Lazer':'#BA7517','Educação':'#378ADD','Roupas':'#639922','Contas':'#888780','Outros':'#888780' };

let mesAtual = new Date().getMonth();
let anoAtual = new Date().getFullYear();
let tipoAtual = 'receita';
let lancamentos = [];

async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

async function carregarLancamentos() {
  const inicio = `${anoAtual}-${String(mesAtual+1).padStart(2,'0')}-01`;
  const fim = `${anoAtual}-${String(mesAtual+1).padStart(2,'0')}-31`;
  lancamentos = await api('GET', `lancamentos?data=gte.${inicio}&data=lte.${fim}&order=data.desc`);
  renderizar();
}

function fmt(n) {
  return 'R$ ' + Math.abs(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function renderizar() {
  const label = MESES[mesAtual] + ' ' + anoAtual;
  document.getElementById('header-month').textContent = label;
  document.getElementById('mes-label').textContent = label;
  document.getElementById('mes-label2').textContent = label;
  document.getElementById('mes-label3').textContent = label;

  const rec = lancamentos.filter(t => t.tipo === 'receita').reduce((a,t) => a + Number(t.valor), 0);
  const exp = lancamentos.filter(t => t.tipo === 'despesa').reduce((a,t) => a + Number(t.valor), 0);
  const sal = rec - exp;

  document.getElementById('header-saldo').textContent = (sal < 0 ? '-' : '') + fmt(sal);
  document.getElementById('header-saldo').style.color = sal < 0 ? '#ffb3a0' : '#fff';
  document.getElementById('header-rec').textContent = fmt(rec);
  document.getElementById('header-exp').textContent = fmt(exp);

  // Lista início (últimos 5)
  const ultimos = lancamentos.slice(0, 5);
  document.getElementById('lista-inicio').innerHTML = ultimos.length
    ? ultimos.map(txHtml).join('')
    : '<div class="empty">Nenhum lançamento neste mês.</div>';

  // Lista completa
  document.getElementById('lista-todos').innerHTML = lancamentos.length
    ? lancamentos.map(txHtml).join('')
    : '<div class="empty">Nenhum lançamento neste mês.</div>';

  // Categorias
  const catMap = {};
  lancamentos.filter(t => t.tipo === 'despesa').forEach(t => {
    catMap[t.categoria] = (catMap[t.categoria] || 0) + Number(t.valor);
  });
  const entries = Object.entries(catMap).sort((a,b) => b[1]-a[1]);
  const maxVal = entries.length ? entries[0][1] : 1;
  const catHtml = entries.map(([cat, val]) => `
    <div class="bar-row">
      <div class="bar-label">${CAT_EMOJI[cat]||'📦'} ${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/maxVal*100)}%;background:${CAT_COR[cat]||'#888'}"></div></div>
      <div class="bar-val">${fmt(val)}</div>
    </div>`).join('');
  document.getElementById('lista-categorias').innerHTML = catHtml || '<div class="empty">Nenhuma despesa ainda.</div>';
  document.getElementById('graficos-cat').innerHTML = catHtml || '<div class="empty">Nenhuma despesa ainda.</div>';

  // Gráficos resumo
  if (rec > 0 || exp > 0) {
    const max = Math.max(rec, exp);
    document.getElementById('graficos-resumo').innerHTML = `
      <div class="bar-row"><div class="bar-label">💚 Receitas</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(rec/max*100)}%;background:#1D9E75"></div></div><div class="bar-val">${fmt(rec)}</div></div>
      <div class="bar-row"><div class="bar-label">🔴 Despesas</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(exp/max*100)}%;background:#D85A30"></div></div><div class="bar-val">${fmt(exp)}</div></div>
      <div style="margin-top:14px;padding-top:12px;border-top:0.5px solid #f0f0ec;font-size:13px;color:#555;">
        Saldo: <strong style="color:${sal>=0?'#1D9E75':'#D85A30'}">${sal<0?'-':''}${fmt(sal)}</strong>
      </div>`;
  } else {
    document.getElementById('graficos-resumo').innerHTML = '<div class="empty">Nenhum dado ainda.</div>';
  }
}

function txHtml(t) {
  const emoji = CAT_EMOJI[t.categoria] || '📦';
  const cor = CAT_COR[t.categoria] || '#888';
  const bg = t.tipo === 'receita' ? '#E1F5EE' : '#FAECE7';
  const valorCor = t.tipo === 'receita' ? 'positivo' : 'negativo';
  const sinal = t.tipo === 'receita' ? '+' : '-';
  const data = new Date(t.data + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
  return `<div class="tx">
    <div class="tx-icon" style="background:${bg};font-size:18px;">${emoji}</div>
    <div class="tx-info">
      <div class="tx-name">${t.descricao}</div>
      <div class="tx-meta">${t.categoria}</div>
    </div>
    <div class="tx-right">
      <div class="tx-valor ${valorCor}">${sinal}${fmt(t.valor)}</div>
      <div class="tx-data">${data}</div>
    </div>
    <button class="tx-del" onclick="deletar('${t.id}')" aria-label="Excluir">×</button>
  </div>`;
}

async function deletar(id) {
  if (!confirm('Excluir este lançamento?')) return;
  await api('DELETE', `lancamentos?id=eq.${id}`);
  mostrarToast('Lançamento excluído');
  carregarLancamentos();
}

function setTipo(tipo) {
  tipoAtual = tipo;
  document.getElementById('btn-rec').className = 'tipo-btn' + (tipo === 'receita' ? ' ativo-rec' : '');
  document.getElementById('btn-exp').className = 'tipo-btn' + (tipo === 'despesa' ? ' ativo-exp' : '');
  const cats = tipo === 'receita' ? CATS_RECEITA : CATS_DESPESA;
  document.getElementById('inp-cat').innerHTML = cats.map(c => `<option value="${c}">${CAT_EMOJI[c]||''} ${c}</option>`).join('');
}

async function salvarLancamento() {
  const desc = document.getElementById('inp-desc').value.trim();
  const valor = parseFloat(document.getElementById('inp-valor').value);
  const data = document.getElementById('inp-data').value;
  const categoria = document.getElementById('inp-cat').value;
  if (!desc || !valor || !data) { mostrarToast('Preencha todos os campos!'); return; }
  const btn = document.getElementById('btn-salvar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';
  try {
    await api('POST', 'lancamentos', { descricao: desc, valor, tipo: tipoAtual, categoria, data });
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-valor').value = '';
    mostrarToast('Lançamento salvo!');
    irPara('inicio', document.querySelector('.bnav'));
    carregarLancamentos();
  } catch(e) {
    mostrarToast('Erro ao salvar. Tente novamente.');
  }
  btn.disabled = false;
  btn.textContent = 'Salvar lançamento';
}

function mudarMes(dir) {
  mesAtual += dir;
  if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
  if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
  carregarLancamentos();
}

function irPara(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bnav').forEach(b => b.classList.remove('ativo'));
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('ativo');
  window.scrollTo(0, 0);
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
document.getElementById('inp-data').value = new Date().toISOString().split('T')[0];
setTipo('receita');
carregarLancamentos();
</script>
</body>
</html>
